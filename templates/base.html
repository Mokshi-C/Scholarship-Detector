<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard{% endblock %} · ScholarVerify AI</title>
  <style>
    :root {
      --sidebar-bg: #151823;
      --content-bg: #f4f6fb;
      --card-bg: #ffffff;
      --text: #1f2433;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #4f46e5;
      --primary-dark: #4338ca;
      --approved: #16a34a;
      --rejected: #dc2626;
      --review: #d97706;
      --suspicious: #7c3aed;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', system-ui, -apple-system, Roboto, sans-serif;
      background: var(--content-bg);
      color: var(--text);
    }
    a { color: var(--primary); }

    .app-shell { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 250px;
      background: var(--sidebar-bg);
      color: #e5e7eb;
      padding: 24px 18px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar .brand {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }
    .sidebar .tagline {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-bottom: 28px;
    }
    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #cbd5e1;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 4px;
      font-size: 0.92rem;
      transition: background .15s, color .15s;
    }
    .sidebar nav a:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .sidebar nav a.active { background: var(--primary); color: #fff; }
    .sidebar .footer-note {
      margin-top: auto;
      font-size: 0.72rem;
      color: #6b7280;
      line-height: 1.5;
    }

    /* Main */
    .main { margin-left: 250px; flex: 1; padding: 28px 36px; }
    .page-header { margin-bottom: 22px; }
    .page-header h1 { margin: 0 0 4px; font-size: 1.6rem; }
    .page-header p { margin: 0; color: var(--muted); font-size: 0.92rem; }

    /* Grid helpers */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 16px;
      margin-bottom: 22px;
    }
    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    /* Cards */
    .card, .stat-card, .table-card, .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .card { padding: 18px 20px; }
    .card h3 { margin: 0 0 14px; font-size: 1rem; }

    .stat-card { padding: 16px 18px; }
    .stat-card .value { font-size: 1.7rem; font-weight: 700; }
    .stat-card .label {
      color: var(--muted); font-size: 0.74rem;
      text-transform: uppercase; letter-spacing: .04em; margin-top: 2px;
    }
    .stat-approved .value { color: var(--approved); }
    .stat-rejected .value { color: var(--rejected); }
    .stat-review .value { color: var(--review); }
    .stat-suspicious .value { color: var(--suspicious); }

    /* Tables */
    .table-card { overflow-x: auto; }
    .table-card-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
    }
    .table-card-header h3 { margin: 0; font-size: 1rem; }
    .table-card-header input {
      padding: 8px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.85rem; width: 240px;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left; background: #f9fafb; color: var(--muted);
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: .04em;
      padding: 10px 14px; border-bottom: 1px solid var(--border); white-space: nowrap;
    }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    .muted { color: var(--muted); font-size: 0.8rem; }

    /* Badges */
    .badge {
      display: inline-block; padding: 4px 10px; border-radius: 999px;
      font-size: 0.74rem; font-weight: 600; white-space: nowrap;
    }
    .badge-approved { background: #dcfce7; color: var(--approved); }
    .badge-rejected { background: #fee2e2; color: var(--rejected); }
    .badge-review   { background: #fef3c7; color: var(--review); }
    .badge-suspicious { background: #ede9fe; color: var(--suspicious); }
    .badge-pass { background: #dcfce7; color: var(--approved); }
    .badge-fail { background: #fee2e2; color: var(--rejected); }

    /* Progress bars */
    .progress {
      height: 8px; width: 90px; border-radius: 999px;
      background: #e5e7eb; overflow: hidden; display: inline-block; vertical-align: middle;
    }
    .progress-fill { height: 100%; border-radius: 999px; }

    /* Buttons / links */
    .btn {
      display: inline-block; background: var(--primary); color: #fff;
      border: none; padding: 10px 22px; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: var(--primary-dark); }
    .btn-sm {
      display: inline-block; background: var(--primary); color: #fff;
      padding: 6px 14px; border-radius: 6px; font-size: 0.78rem;
      font-weight: 600; text-decoration: none;
    }
    .btn-sm:hover { background: var(--primary-dark); }
    .btn-link { font-size: 0.85rem; font-weight: 600; text-decoration: none; }

    /* Forms */
    .form-card { padding: 26px 30px; max-width: 820px; }
    .form-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px; margin-bottom: 18px;
    }
    .form-section-title {
      font-size: 0.78rem; text-transform: uppercase; letter-spacing: .05em;
      color: var(--muted); margin: 22px 0 10px; font-weight: 700;
    }
    .form-group label {
      display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px;
    }
    .form-group input, .form-group select {
      width: 100%; padding: 9px 12px; border: 1px solid var(--border);
      border-radius: 8px; font-size: 0.9rem; background: #fff; color: var(--text);
    }
    .form-group input[type="file"] { padding: 6px; font-size: 0.82rem; }

    /* Misc */
    .top-rec-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .top-rec-meta { display: flex; gap: 18px; font-size: 0.88rem; margin-bottom: 4px; }
    .top-rec-sub { color: var(--muted); font-size: 0.8rem; margin-bottom: 12px; }

    .reason-list { margin: 8px 0 0; padding-left: 20px; font-size: 0.9rem; line-height: 1.6; }
    .explanation-summary { font-weight: 600; margin-bottom: 4px; }

    details summary { cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    details pre {
      background: #f9fafb; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px; font-size: 0.78rem; white-space: pre-wrap; margin-top: 8px;
    }

    .status-update { display: flex; gap: 10px; align-items: center; }
    .status-update select { padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; }

    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .info-grid div span { display: block; color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: .04em; }
    .info-grid div strong { font-size: 0.92rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">🎓 ScholarVerify AI</div>
      <div class="tagline">Scholarship Recommendation &amp; Verification Platform</div>
      <nav>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.path == url_for('dashboard') else '' }}">
          📊 Dashboard
        </a>
        <a href="{{ url_for('apply') }}" class="{{ 'active' if request.path == url_for('apply') else '' }}">
          📝 New Application
        </a>
      </nav>
      <div class="footer-note">
        AI-Powered Recommendation Engine · Eligibility Scoring ·
        Automated Verification &amp; Explanations
      </div>
    </aside>

    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
