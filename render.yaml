# render.yaml — Render Blueprint
# This file lets you deploy with "New > Blueprint" on Render and have it
# auto-provision the web service, a persistent disk for uploads, and a
# managed Postgres database, all wired together via environment variables.
#
# If you'd rather click through Render's UI manually instead of using a
# Blueprint, see DEPLOYMENT.md for the equivalent manual steps — this file
# is optional, not required.

services:
  - type: web
    name: eligibilityx
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard — do not commit real keys
      - key: DATABASE_URL
        fromDatabase:
          name: eligibilityx-db
          property: connectionString
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: FLASK_DEBUG
        value: "false"
    disk:
      name: eligibilityx-uploads
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: eligibilityx-db
    plan: free
    databaseName: scholarship
    user: scholarship_user
